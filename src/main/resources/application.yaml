spring:
  application:
    name: ticketflow-api

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret-key: ${JWT_SECRET_KEY}


