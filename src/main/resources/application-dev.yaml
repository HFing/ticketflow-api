spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: redis
    cache-names: eventsList,publicEventDetail,adminEventDetail

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ticketflow-mail-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hfing.ticketflowapi.notification.dto"
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:no-reply@ticketflow.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


payment:
  currency: ${PAYMENT_CURRENCY:VND}
  hold-duration: ${PAYMENT_HOLD_DURATION:PT5M}
  expiration-scan-interval: ${PAYMENT_EXPIRATION_SCAN_INTERVAL:PT5S}
  expiration-batch-size: ${PAYMENT_EXPIRATION_BATCH_SIZE:100}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    test-mode-only: ${STRIPE_TEST_MODE_ONLY:true}
    success-url: ${STRIPE_CHECKOUT_SUCCESS_URL:http://localhost:8080/api/v1/payments/stripe/success?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${STRIPE_CHECKOUT_CANCEL_URL:http://localhost:5173/payment/cancel}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha




